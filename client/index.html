<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpaceColony</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; overflow: hidden; font-family: 'Segoe UI', monospace; color: #ccc; }
    canvas { display: block; }

    /* Auth screen */
    #auth-screen {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0d1117 0%, #010409 100%);
    }
    #auth-screen.hidden { display: none; }
    .auth-box {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; padding: 40px; width: 360px; text-align: center;
    }
    .auth-box h1 { font-size: 28px; color: #00ff88; margin-bottom: 6px; letter-spacing: 2px; }
    .auth-box .subtitle { color: #666; font-size: 13px; margin-bottom: 28px; }
    .auth-box input {
      width: 100%; padding: 10px 14px; margin-bottom: 12px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #e6edf3; font-size: 14px; font-family: monospace; outline: none;
    }
    .auth-box input:focus { border-color: #00ff88; }
    .auth-box .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .auth-box button {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      font-size: 14px; font-family: monospace; cursor: pointer; transition: opacity 0.2s;
    }
    .auth-box button:hover { opacity: 0.85; }
    .btn-login { background: #00ff88; color: #000; font-weight: bold; }
    .btn-register { background: #30363d; color: #ccc; }
    .auth-error { color: #ff6b6b; font-size: 12px; margin-top: 12px; min-height: 18px; }

    /* Top menu bar */
    #menu-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 8000;
      display: none; height: 36px;
      background: rgba(10,14,20,0.92);
      border-bottom: 1px solid rgba(0,255,136,0.1);
      align-items: center;
      padding: 0 12px;
      gap: 2px;
    }
    #menu-bar.visible { display: flex; }
    #menu-bar .menu-left { display: flex; align-items: center; gap: 2px; }
    #menu-bar .menu-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    #menu-bar .menu-btn {
      padding: 4px 10px; border: none; border-radius: 4px;
      background: transparent; color: #889999; font-size: 12px; font-family: monospace;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px;
      height: 28px;
    }
    #menu-bar .menu-btn:hover { background: rgba(255,255,255,0.06); color: #ccdddd; }
    #menu-bar .menu-btn .icon { font-size: 15px; }
    #menu-bar .menu-btn .key { color: #556666; font-size: 10px; margin-left: 2px; }
    #menu-bar .menu-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.06); margin: 0 4px; }
    #menu-bar .menu-username { color: #00ff88; font-size: 12px; font-family: monospace; margin-right: 6px; }
    #btn-admin { color: #ffcc44 !important; }
    #btn-logout { color: #cc6666 !important; }

    /* Admin panel */
    #admin-panel {
      position: fixed; top: 50px; right: 10px; z-index: 8500;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 16px; width: 380px; max-height: 500px; overflow-y: auto;
      display: none; font-family: monospace;
    }
    #admin-panel.visible { display: block; }
    #admin-panel h3 { color: #ffcc44; margin-bottom: 12px; font-size: 15px; }
    .admin-user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 12px;
    }
    .admin-user-row .name { color: #e6edf3; flex: 1; }
    .admin-user-row .badges { margin: 0 8px; }
    .admin-user-row .badge {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; margin-left: 4px;
    }
    .badge-admin { background: #ffcc44; color: #000; }
    .badge-banned { background: #ff4444; color: #fff; }
    .admin-user-row .actions { display: flex; gap: 4px; }
    .admin-user-row .actions button {
      padding: 2px 8px; border: 1px solid #30363d; border-radius: 3px;
      background: #0d1117; color: #aaa; font-size: 10px; font-family: monospace;
      cursor: pointer;
    }
    .admin-user-row .actions button:hover { background: #30363d; color: #fff; }
    .btn-danger { border-color: #ff4444 !important; color: #ff6b6b !important; }
  </style>
</head>
<body>
  <div id="auth-screen">
    <div class="auth-box">
      <h1>SPACECOLONY</h1>
      <p class="subtitle">Open-world sci-fi colony sim</p>
      <input type="text" id="auth-username" placeholder="Username" autocomplete="off" />
      <input type="password" id="auth-password" placeholder="Password" />
      <div class="btn-row">
        <button class="btn-login" id="btn-login">Login</button>
        <button class="btn-register" id="btn-register">Register</button>
      </div>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <!-- In-game menu bar -->
  <div id="menu-bar">
    <div class="menu-left">
      <button class="menu-btn" id="btn-menu-inventory"><span class="icon">&#x1F4E6;</span> Inventory <span class="key">I</span></button>
      <button class="menu-btn" id="btn-menu-crafting"><span class="icon">&#x2692;</span> Crafting <span class="key">C</span></button>
      <button class="menu-btn" id="btn-menu-research"><span class="icon">&#x1F52C;</span> Research <span class="key">R</span></button>
      <button class="menu-btn" id="btn-menu-map"><span class="icon">&#x1F5FA;</span> Map <span class="key">M</span></button>
      <button class="menu-btn" id="btn-menu-character"><span class="icon">&#x1F464;</span> Character</button>
      <button class="menu-btn" id="btn-menu-settings"><span class="icon">&#x2699;</span> Settings</button>
    </div>
    <div class="menu-right">
      <span class="menu-username" id="menu-username"></span>
      <div class="menu-sep"></div>
      <button class="menu-btn" id="btn-admin" style="display:none"><span class="icon">&#x1F6E1;</span> Admin</button>
      <button class="menu-btn" id="btn-logout"><span class="icon">&#x23FB;</span> Logout</button>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel">
    <h3>Admin Panel</h3>
    <div id="admin-users-list"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
